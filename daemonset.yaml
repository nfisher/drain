apiVersion: v1
kind: ServiceAccount
metadata:
  name: drain-cluster
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: drain-cluster-config
data:
  config.hcl: |
    telemetry {
      metrics_listen_address = ":9090"
    }

    source "dmesg" "kernel" {
      follow = true
      kmsg_path = "/host/dev/kmsg"
    }

    sink "jsonl" "stdout" {}

    pipeline "kernel" {
      model = "/etc/drain/model/model.json"
      sources = ["dmesg.kernel"]
      sinks = ["jsonl.stdout"]
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: drain-cluster
  labels:
    app.kubernetes.io/name: drain-cluster
    app.kubernetes.io/component: log-parser
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: drain-cluster
      app.kubernetes.io/component: log-parser
  template:
    metadata:
      labels:
        app.kubernetes.io/name: drain-cluster
        app.kubernetes.io/component: log-parser
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: drain-cluster
      automountServiceAccountToken: false
      containers:
        - name: cluster
          image: ghcr.io/nfisher/drain-cluster:latest
          args:
            - parse
            - -config
            - /etc/drain/config/config.hcl
          ports:
            - name: metrics
              containerPort: 9090
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
          securityContext:
            # Required so the container can read the host kernel message device at
            # /host/dev/kmsg. If cluster validation proves a narrower security
            # context can read this device, replace privileged mode with that
            # minimum context. Otherwise, clusters enforcing the restricted Pod
            # Security profile must grant an explicit exception for this DaemonSet.
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /etc/drain/config
              readOnly: true
            - name: model
              mountPath: /etc/drain/model
              readOnly: true
            - name: host-dev
              mountPath: /host/dev
              readOnly: true
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-sys
              mountPath: /host/sys
              readOnly: true
            - name: host-run
              mountPath: /host/run
              readOnly: true
            - name: host-var-log
              mountPath: /host/var/log
              readOnly: true
            - name: checkpoints
              mountPath: /var/lib/drain/checkpoints
      volumes:
        - name: config
          configMap:
            name: drain-cluster-config
        - name: model
          configMap:
            name: drain-cluster-model
        - name: host-dev
          hostPath:
            path: /dev
            type: Directory
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        - name: host-sys
          hostPath:
            path: /sys
            type: Directory
        - name: host-run
          hostPath:
            path: /run
            type: Directory
        - name: host-var-log
          hostPath:
            path: /var/log
            type: Directory
        - name: checkpoints
          hostPath:
            path: /var/lib/drain/checkpoints
            type: DirectoryOrCreate
