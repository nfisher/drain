name: Release binaries

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.tag.outputs.should_release }}
      tag_name: ${{ steps.tag.outputs.tag_name }}

    steps:
      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          case "$GITHUB_EVENT_NAME" in
            push)
              tag="$GITHUB_REF_NAME"
              if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "::notice::Tag '$tag' does not match vY.Y.Y; skipping release"
                echo "should_release=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              ;;
            release)
              tag="$RELEASE_TAG"
              ;;
            workflow_dispatch)
              tag="$INPUT_TAG"
              ;;
            *)
              echo "::error::Unsupported event '$GITHUB_EVENT_NAME'"
              exit 1
              ;;
          esac

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: github.event_name == 'push' && steps.tag.outputs.should_release == 'true'
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        run: gh release create "$TAG_NAME" --verify-tag --title "$TAG_NAME" --generate-notes

  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ubuntu-latest
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: cluster-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: cluster-linux-arm64
          - goos: darwin
            goarch: arm64
            asset_name: cluster-osx-arm64
          - goos: windows
            goarch: amd64
            asset_name: cluster-windows-amd64.exe
          - goos: windows
            goarch: arm64
            asset_name: cluster-windows-arm64.exe

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag_name }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          ASSET_NAME: ${{ matrix.asset_name }}
          CGO_ENABLED: "0"
          GOARCH: ${{ matrix.goarch }}
          GOOS: ${{ matrix.goos }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: |
          mkdir -p dist
          VERSION_BASE="${TAG_NAME#v}"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          BUILD_VERSION="${VERSION_BASE}+${SHORT_SHA}"
          go build -trimpath -ldflags="-s -w -X main.buildVersion=${BUILD_VERSION} -X main.buildCommit=${SHORT_SHA}" -o "dist/${ASSET_NAME}" ./cmd/cluster

      - name: Upload binary to release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" "dist/${{ matrix.asset_name }}" --clobber
