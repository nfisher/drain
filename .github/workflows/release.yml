name: Release

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true

permissions:
  contents: write
  packages: write

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.tag.outputs.should_release }}
      tag_name: ${{ steps.tag.outputs.tag_name }}

    steps:
      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          case "$GITHUB_EVENT_NAME" in
            push)
              tag="$GITHUB_REF_NAME"
              if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "::notice::Tag '$tag' does not match vY.Y.Y; skipping release"
                echo "should_release=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              ;;
            release)
              tag="$RELEASE_TAG"
              ;;
            workflow_dispatch)
              tag="$INPUT_TAG"
              ;;
            *)
              echo "::error::Unsupported event '$GITHUB_EVENT_NAME'"
              exit 1
              ;;
          esac

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: github.event_name == 'push' && steps.tag.outputs.should_release == 'true'
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        run: gh release create "$TAG_NAME" --verify-tag --title "$TAG_NAME" --generate-notes

  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ubuntu-latest
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: cluster-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: cluster-linux-arm64
          - goos: darwin
            goarch: arm64
            asset_name: cluster-osx-arm64
          - goos: windows
            goarch: amd64
            asset_name: cluster-windows-amd64.exe
          - goos: windows
            goarch: arm64
            asset_name: cluster-windows-arm64.exe

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag_name }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve build metadata
        id: build_metadata
        env:
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: |
          VERSION_BASE="${TAG_NAME#v}"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          echo "build_version=${VERSION_BASE}+${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build Linux binary with libsystemd
        if: matrix.goos == 'linux'
        env:
          ASSET_NAME: ${{ matrix.asset_name }}
          BUILD_VERSION: ${{ steps.build_metadata.outputs.build_version }}
          GOARCH: ${{ matrix.goarch }}
          SHORT_SHA: ${{ steps.build_metadata.outputs.short_sha }}
        run: |
          mkdir -p dist
          docker run --rm --platform "linux/${GOARCH}" \
            -e ASSET_NAME \
            -e BUILD_VERSION \
            -e CGO_ENABLED=1 \
            -e GOARCH \
            -e GOOS=linux \
            -e SHORT_SHA \
            -v "${PWD}:/src" \
            -w /src \
            golang:1.25-bookworm \
            bash -lc 'apt-get update && apt-get install -y --no-install-recommends libsystemd-dev pkg-config && go build -trimpath -ldflags="-s -w -X main.buildVersion=${BUILD_VERSION} -X main.buildCommit=${SHORT_SHA}" -o "dist/${ASSET_NAME}" ./cmd/cluster'

      - name: Build static stub binary
        if: matrix.goos != 'linux'
        env:
          ASSET_NAME: ${{ matrix.asset_name }}
          CGO_ENABLED: "0"
          BUILD_VERSION: ${{ steps.build_metadata.outputs.build_version }}
          GOARCH: ${{ matrix.goarch }}
          GOOS: ${{ matrix.goos }}
          SHORT_SHA: ${{ steps.build_metadata.outputs.short_sha }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X main.buildVersion=${BUILD_VERSION} -X main.buildCommit=${SHORT_SHA}" -o "dist/${ASSET_NAME}" ./cmd/cluster

      - name: Upload binary to release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" "dist/${{ matrix.asset_name }}" --clobber

  container:
    name: Build container
    runs-on: ubuntu-latest
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag_name }}

      - name: Resolve container metadata
        id: metadata
        env:
          GH_REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: |
          repository="${GH_REPOSITORY,,}"
          owner="${repository%%/*}"
          repo="${repository#*/}"
          version_base="${TAG_NAME#v}"
          short_sha="$(git rev-parse --short=12 HEAD)"
          build_version="${version_base}+${short_sha}"
          image="ghcr.io/${owner}/${repo}-cluster"

          echo "build_version=${build_version}" >> "$GITHUB_OUTPUT"
          echo "full_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "release_url=https://github.com/${GH_REPOSITORY}/releases/tag/${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "version_base=${version_base}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push container
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.metadata.outputs.build_version }}
            COMMIT=${{ steps.metadata.outputs.short_sha }}
          tags: |
            ${{ steps.metadata.outputs.image }}:${{ needs.prepare-release.outputs.tag_name }}
            ${{ steps.metadata.outputs.image }}:${{ steps.metadata.outputs.version_base }}
            ${{ steps.metadata.outputs.image }}:latest
          labels: |
            org.opencontainers.image.title=Drain cluster CLI
            org.opencontainers.image.description=Drain cluster CLI
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=${{ steps.metadata.outputs.release_url }}
            org.opencontainers.image.version=${{ steps.metadata.outputs.build_version }}
            org.opencontainers.image.revision=${{ steps.metadata.outputs.full_sha }}

      - name: Upload container references to release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          IMAGE: ${{ steps.metadata.outputs.image }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
          VERSION_BASE: ${{ steps.metadata.outputs.version_base }}
          BUILD_VERSION: ${{ steps.metadata.outputs.build_version }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p dist
          {
            echo "image: ${IMAGE}"
            echo "tags:"
            echo "  - ${IMAGE}:${TAG_NAME}"
            echo "  - ${IMAGE}:${VERSION_BASE}"
            echo "  - ${IMAGE}:latest"
            echo "digest: ${DIGEST}"
            echo "version: ${BUILD_VERSION}"
          } > dist/cluster-container.txt
          gh release upload "$TAG_NAME" dist/cluster-container.txt --clobber
