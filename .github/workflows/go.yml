name: Go
run-name: "${{ github.event.head_commit.message || github.event.pull_request.title || format('Go {0} by @{1}', github.ref_name, github.actor) }}"

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go and systemd dependencies
        uses: ./.github/actions/setup-go-systemd

      - name: Run tests with race detector and coverage
        run: go test -race -v -covermode=atomic -coverprofile=coverage.out ./...

      - name: Run no-cgo tests
        run: CGO_ENABLED=0 go test ./...

      - name: Report coverage
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
          {
            echo "### Coverage"
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            coverage.out
            coverage.txt

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5

  security:
    name: Security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      GO_VERSION: "1.25.11"
      GOVULNCHECK_VERSION: v1.4.0
      GOSEC_VERSION: v2.27.1
      GOBIN: ${{ github.workspace }}/.go-tools/bin
      GOCACHE: ${{ github.workspace }}/.go-tools/cache/go-build
      GOMODCACHE: ${{ github.workspace }}/.go-tools/cache/go-mod

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Cache Go scanner tools
        uses: actions/cache@v4
        with:
          path: |
            .go-tools/bin
            .go-tools/cache/go-build
            .go-tools/cache/go-mod
          key: go-scanner-tools-${{ runner.os }}-go${{ env.GO_VERSION }}-govulncheck-${{ env.GOVULNCHECK_VERSION }}-gosec-${{ env.GOSEC_VERSION }}

      - name: Set up Go and systemd dependencies
        uses: ./.github/actions/setup-go-systemd

      - name: Add Go scanner tools to PATH
        run: |
          mkdir -p "${GOBIN}"
          echo "${GOBIN}" >> "$GITHUB_PATH"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}

      - name: Run govulncheck
        id: run_govulncheck
        run: |
          set +e
          govulncheck ./... 2>&1 | tee govulncheck.txt
          status=${PIPESTATUS[0]}
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}

      - name: Run gosec
        id: run_gosec
        run: |
          set +e
          gosec ./... 2>&1 | tee gosec.txt
          text_status=${PIPESTATUS[0]}
          gosec -fmt sarif -out gosec.sarif ./...
          sarif_status=$?

          echo "text_status=${text_status}" >> "$GITHUB_OUTPUT"
          echo "sarif_status=${sarif_status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload security text reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-text-reports
          path: |
            govulncheck.txt
            gosec.txt
          if-no-files-found: warn

      - name: Upload gosec SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec.sarif

      - name: Fail security scan on findings
        if: always()
        run: |
          govuln_status="${{ steps.run_govulncheck.outputs.status }}"
          gosec_text_status="${{ steps.run_gosec.outputs.text_status }}"
          gosec_sarif_status="${{ steps.run_gosec.outputs.sarif_status }}"

          failed=0
          if [ "${govuln_status:-1}" -ne 0 ]; then
            echo "govulncheck failed with status ${govuln_status:-missing}"
            failed=1
          fi
          if [ "${gosec_text_status:-1}" -ne 0 ]; then
            echo "gosec text report failed with status ${gosec_text_status:-missing}"
            failed=1
          fi
          if [ "${gosec_sarif_status:-1}" -ne 0 ]; then
            echo "gosec SARIF report failed with status ${gosec_sarif_status:-missing}"
            failed=1
          fi
          exit "$failed"

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go and systemd dependencies
        uses: ./.github/actions/setup-go-systemd

      - name: Run benchmarks
        run: go test -run='^$' -bench=. -benchmem -count=10 ./... | tee benchmarks.txt

      - name: Report benchmarks
        run: |
          {
            echo "### Benchmarks"
            echo '```'
            cat benchmarks.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks
          path: benchmarks.txt
