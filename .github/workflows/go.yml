name: Go
run-name: "${{ github.event.head_commit.message || github.event.pull_request.title || format('Go {0} by @{1}', github.ref_name, github.actor) }}"

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true

      - name: Install systemd development headers
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libsystemd-dev pkg-config

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: go test -v -covermode=atomic -coverprofile=coverage.out ./...

      - name: Run no-cgo tests
        run: CGO_ENABLED=0 go test ./...

      - name: Report coverage
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
          {
            echo "### Coverage"
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            coverage.out
            coverage.txt

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5

  security:
    name: Security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true

      - name: Install systemd development headers
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libsystemd-dev pkg-config

      - name: Download dependencies
        run: go mod download

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -fmt sarif -out gosec.sarif ./...

      - name: Upload gosec SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec.sarif

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true

      - name: Install systemd development headers
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libsystemd-dev pkg-config

      - name: Download dependencies
        run: go mod download

      - name: Run benchmarks
        run: go test -run='^$' -bench=. -benchmem -count=10 ./... | tee benchmarks.txt

      - name: Report benchmarks
        run: |
          {
            echo "### Benchmarks"
            echo '```'
            cat benchmarks.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks
          path: benchmarks.txt
