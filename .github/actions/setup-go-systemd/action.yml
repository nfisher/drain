name: Setup Go and systemd dependencies
description: Set up Go, install systemd development dependencies, and download Go modules.

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: "1.25.11"
        cache: true

    - name: Install systemd development headers
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libsystemd-dev pkg-config

    - name: Download dependencies
      shell: bash
      run: go mod download
